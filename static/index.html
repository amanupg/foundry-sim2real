<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Foundry - Image to Physics Asset</title>
<style>
  :root { color-scheme: light dark; --bg: #0f1115; --panel: #161a22; --fg: #e6e8ee;
    --muted:#8b93a7; --accent:#5b9dff; --ok:#3ecf8e; --warn:#f5a623; --err:#ff5c5c; --border:#262b36; }
  * { box-sizing: border-box; }
  body { margin:0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:var(--bg); color:var(--fg); }
  header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; }
  header h1 { font-size:18px; margin:0; font-weight:600; }
  header .sub { color:var(--muted); font-size:12px; }
  main { max-width:1100px; margin:0 auto; padding:20px; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:16px; }
  .panel h2 { margin:0 0 12px; font-size:15px; font-weight:600; }
  .row { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
  label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
  input[type=file] { flex:1; min-width:220px; color:var(--fg); }
  input[type=number] { width:90px; padding:6px 8px; background:#0b0d12; color:var(--fg);
    border:1px solid var(--border); border-radius:5px; }
  button { padding:8px 16px; background:var(--accent); color:#fff; border:0; border-radius:5px;
    font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  .banner { padding:8px 12px; border-radius:5px; font-size:12px; margin-bottom:12px; }
  .banner.warn { background:rgba(245,166,35,.12); color:var(--warn); border:1px solid var(--warn); }
  .banner.ok { background:rgba(62,207,142,.12); color:var(--ok); border:1px solid var(--ok); }
  .stages { display:flex; gap:6px; flex-wrap:wrap; }
  .stage { padding:5px 10px; border-radius:4px; font-size:11px; background:#0b0d12;
    border:1px solid var(--border); color:var(--muted); }
  .stage.active { border-color:var(--accent); color:var(--accent); }
  .stage.done { border-color:var(--ok); color:var(--ok); }
  .attempts { display:flex; flex-direction:column; gap:12px; }
  .attempt { border:1px solid var(--border); border-radius:6px; padding:12px; background:#0b0d12; }
  .attempt h3 { margin:0 0 6px; font-size:13px; }
  .verdict { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size:11px;
    background:#000; padding:8px; border-radius:4px; overflow:auto; white-space:pre-wrap; color:#cdd3e0; }
  .renders { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .renders img { width:96px; height:96px; object-fit:cover; border-radius:4px; border:1px solid var(--border); }
  .viewer { width:100%; height:360px; border:1px solid var(--border); border-radius:6px; background:#000; }
  .download { margin-top:10px; }
  .muted { color:var(--muted); font-size:12px; }
  .pass { color:var(--ok); } .fail { color:var(--err); }
  #status { font-size:12px; color:var(--muted); }
</style>
</head>
<body>
<header>
  <h1>Foundry</h1>
  <span class="sub">image to physics-ready 3D asset</span>
  <span id="status"></span>
</header>
<main>
  <div class="panel" id="banners"></div>

  <div class="panel">
    <h2>Input</h2>
    <div class="row">
      <div style="flex:1; min-width:220px;">
        <label>Photo of a single object (plain background works best)</label>
        <input type="file" id="file" accept="image/*"/>
      </div>
      <div>
        <label>Density (kg/m^3)</label>
        <input type="number" id="density" value="500" step="50"/>
      </div>
      <div>
        <label>Longest real dim (m)</label>
        <input type="number" id="dim" value="0.2" step="0.01"/>
      </div>
      <button id="run">Run pipeline</button>
    </div>
    <p class="muted">Works best on a single isolated rigid object (mug, shoe, toy, chair). Scale is a user-provided estimate; the back of the object is inferred.</p>
  </div>

  <div class="panel" id="timeline" style="display:none;">
    <h2>Pipeline stages</h2>
    <div class="stages" id="stages"></div>
  </div>

  <div class="panel" id="result" style="display:none;">
    <h2>Result</h2>
    <div id="result-summary"></div>
    <div class="viewer" id="viewer"></div>
    <div class="download" id="download"></div>
  </div>

  <div class="panel" id="attempts-panel" style="display:none;">
    <h2>Attempt history (critique-repair loop)</h2>
    <div class="attempts" id="attempts"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const STAGES = ["preprocess","generate_mesh","process_mesh","estimate_physics","make_collision","export_urdf","validate_in_sim","critique"];
let statusData = {};

async function loadStatus(){
  try {
    const r = await fetch('/api/status'); statusData = await r.json();
    const b = document.getElementById('banners');
    b.innerHTML = '';
    if (!statusData.replicate_available) b.innerHTML += '<div class="banner warn">Replicate token not set: 3D generation runs in MOCK mode (trimesh cube).</div>';
    if (!statusData.vlm_available) b.innerHTML += '<div class="banner warn">OpenRouter key not set: VLM critique runs in mock/soft-fail mode.</div>';
    if (statusData.replicate_available && statusData.vlm_available) b.innerHTML += '<div class="banner ok">All credentials present: real APIs enabled.</div>';
    document.getElementById('status').textContent = 'model: ' + (statusData.vlm_model||'?');
  } catch(e){ console.error(e); }
}
loadStatus();

function renderStages(activeIdx, doneIdx){
  const c = document.getElementById('stages');
  c.innerHTML = STAGES.map((s,i)=>{
    let cls = 'stage'; if (i < doneIdx) cls += ' done'; else if (i === activeIdx) cls += ' active';
    return '<span class="'+cls+'">'+s+'</span>';
  }).join('');
}

document.getElementById('run').addEventListener('click', async ()=>{
  const file = document.getElementById('file').files[0];
  if (!file){ alert('Pick an image first'); return; }
  const btn = document.getElementById('run'); btn.disabled = true; btn.textContent = 'Running...';
  document.getElementById('timeline').style.display='';
  document.getElementById('result').style.display='none';
  document.getElementById('attempts-panel').style.display='none';
  renderStages(0, 0);
  const fd = new FormData();
  fd.append('image', file);
  fd.append('density', document.getElementById('density').value);
  fd.append('real_world_longest_dim_meters', document.getElementById('dim').value);
  try {
    // Animate stage progress while the (synchronous) request runs.
    let i = 0; const tick = setInterval(()=>{ renderStages(i % STAGES.length, i > 3 ? 3 : 0); i++; }, 1200);
    const r = await fetch('/api/run', { method:'POST', body: fd });
    clearInterval(tick);
    renderStages(STAGES.length, STAGES.length);
    const summary = await r.json();
    renderResult(summary);
  } catch(e){
    document.getElementById('result').style.display='';
    document.getElementById('result-summary').innerHTML = '<span class="fail">Error: '+e.message+'</span>';
  } finally {
    btn.disabled = false; btn.textContent = 'Run pipeline';
  }
});

function rel(p){ return p ? ('/' + p.replace(/^\/+/, '')) : '#'; }

function renderResult(s){
  document.getElementById('result').style.display='';
  const best = s.best_attempt || {};
  const v = best.verdict || {};
  const passHtml = s.fully_passed ? '<span class="pass">PASSED</span>' : '<span class="fail">did not fully pass</span>';
  document.getElementById('result-summary').innerHTML =
    '<div>'+passHtml+' - '+s.total_attempts+' attempt(s). '+
    (best.reasoning||'')+'</div>'+
    '<div class="muted">mass: '+(best.mass? best.mass.toFixed(3):'?')+' kg | '+
    (best.scale_note||'')+'</div>';
  // Download link.
  const dl = document.getElementById('download');
  dl.innerHTML = best.zip ? '<a href="'+rel(best.zip)+'" download><button>Download asset pack (.zip)</button></a>' : '';
  // Three.js viewer.
  if (best.processed) loadViewer(rel(best.processed));
  // Attempts.
  document.getElementById('attempts-panel').style.display='';
  const ac = document.getElementById('attempts');
  ac.innerHTML = (s.attempts||[]).map(a=>{
    const av = a.verdict||{};
    const renders = (a.renders||[]).map(r=>'<img src="'+rel(r)+'" />').join('');
    return '<div class="attempt"><h3>Attempt '+a.attempt+(a.fix_applied?' (fix: '+a.fix_applied+')':'')+'</h3>'+
      '<div class="muted">'+(a.reasoning||'')+'</div>'+
      '<pre class="verdict">'+JSON.stringify(av,null,2)+'</pre>'+
      (a.sim_report? '<div class="muted">sim: '+JSON.stringify(a.sim_report)+'</div>':'')+
      '<div class="renders">'+renders+'</div></div>';
  }).join('');
}

let renderer, scene, camera, meshObj, animId;
function loadViewer(url){
  const container = document.getElementById('viewer');
  if (!window.THREE){ return; }
  if (renderer){ cancelAnimationFrame(animId); renderer.dispose(); }
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0b0d12);
  camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.01, 100);
  camera.position.set(0.4, 0.3, 0.5);
  renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  container.innerHTML=''; container.appendChild(renderer.domElement);
  const light = new THREE.HemisphereLight(0xffffff, 0x222222, 1.2); scene.add(light);
  const dir = new THREE.DirectionalLight(0xffffff, 1.0); dir.position.set(1,2,3); scene.add(dir);
  const grid = new THREE.GridHelper(1, 10, 0x303a4d, 0x202632); scene.add(grid);
  const loader = new THREE.GLTFLoader();
  loader.load(url, (gltf)=>{
    meshObj = gltf.scene;
    // Center & scale to fit.
    const box = new THREE.Box3().setFromObject(meshObj);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const scale = 0.3 / Math.max(size.x, size.y, size.z);
    meshObj.scale.setScalar(scale);
    meshObj.position.sub(center.multiplyScalar(scale));
    meshObj.position.y -= 0.15;
    scene.add(meshObj);
    animate();
  }, undefined, (e)=> console.error('gltf load error', e));
  function animate(){ animId = requestAnimationFrame(animate); if(meshObj) meshObj.rotation.y += 0.005; renderer.render(scene,camera); }
}
</script>
</body>
</html>
